<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Metas - Mi Alcancía Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilo css -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="glass-panel rounded-3xl p-6 h-fit">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-emerald-400"><i class="fas fa-bullseye mr-2"></i>Mis Metas</h2>
                <button onclick="app.ui.openModal()"
                    class="bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-lg transition text-sm font-bold">
                    <i class="fas fa-plus"></i> Nueva
                </button>
            </div>

            <div id="goals-list" class="space-y-3">
            </div>

            <div class="mt-8 border-t border-white/10 pt-6">
                <h3
                    class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest flex items-center justify-between">
                    <span><i class="fas fa-archive mr-2"></i>Historial</span>
                    <span class="bg-slate-800 text-slate-400 py-1 px-2 rounded-lg text-[10px]"
                        id="history-count">0</span>
                </h3>
                <div id="history-list" class="space-y-3 max-h-40 overflow-y-auto pr-2">
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 glass-panel rounded-3xl p-6 relative">

            <div id="empty-state" class="text-center py-20 hidden">
                <i class="fas fa-piggy-bank text-6xl text-slate-600 mb-4"></i>
                <h3 class="text-xl font-bold text-slate-400">Selecciona o crea una meta financiera</h3>
            </div>

            <div id="active-goal-view" class="hidden">
                <div class="text-center mb-8">
                    <div id="piggy-icon" class="inline-block text-5xl text-emerald-500 mb-2 transition-transform">
                        <i class="fas fa-piggy-bank"></i>
                    </div>
                    <h1 id="view-title" class="text-3xl font-bold mb-1">Nombre Meta</h1>
                    <p class="text-slate-400 text-sm">Progreso de ahorro</p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <p class="text-xs text-slate-400 uppercase mb-1">Acumulado</p>
                        <p id="view-saved" class="text-xl font-bold text-emerald-400">S/ 0</p>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <p class="text-xs text-slate-400 uppercase mb-1">Faltante</p>
                        <p id="view-remaining" class="text-xl font-bold text-slate-200">S/ 0</p>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <p class="text-xs text-slate-400 uppercase mb-1">Días Restantes</p>
                        <p id="view-days-left" class="text-xl font-bold text-sky-400">0</p>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <p class="text-xs text-slate-400 uppercase mb-1">Fecha Estimada</p>
                        <p id="view-date" class="text-sm font-bold text-slate-300 mt-1">--/--/----</p>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="flex justify-between text-sm font-bold mb-2">
                        <span id="view-percent" class="text-emerald-400">0%</span>
                        <span id="view-target" class="text-slate-400">Meta: S/ 0</span>
                    </div>
                    <div class="h-3 bg-slate-800 rounded-full overflow-hidden">
                        <div id="view-bar"
                            class="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 w-0 transition-all duration-700 rounded-full">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">Tablero de Ahorro (S/
                        <span id="view-daily-amount">0</span> diarios)
                    </h3>
                    <div id="grid-container" class="grid-days">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-transaction"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl relative transform scale-95 transition-transform duration-300"
            id="modal-content">
            <button onclick="app.ui.closeModal()"
                class="absolute top-6 right-6 text-slate-400 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>

            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-emerald-400">Registrar Meta</h2>

            <form id="form-goal" class="space-y-5" onsubmit="app.logic.saveGoal(event)">
                <input type="hidden" id="goal-id">

                <div>
                    <label class="block text-xs text-slate-400 mb-1 uppercase">Nombre de la Meta</label>
                    <input type="text" id="goal-name" required placeholder="Ej. PC Gamer, Viaje..."
                        class="w-full neo-input p-3 rounded-xl">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 uppercase">Meta Total</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">S/</span>
                            <input type="number" id="goal-target" required step="1" min="10"
                                class="w-full neo-input p-3 pl-9 rounded-xl font-mono">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 uppercase">Ahorro Diario</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">S/</span>
                            <input type="number" id="goal-daily" required step="1" min="1"
                                class="w-full neo-input p-3 pl-9 rounded-xl font-mono">
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-500/20 transition-all">
                        Guardar Meta
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2"></div>

    <!-- Java script -->
    <script src="config.js"></script>
</body>

</html>
